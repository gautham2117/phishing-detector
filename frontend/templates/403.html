{% extends "base.html" %}
{% block title %}403 — Access Denied{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center">
  <div style="font-size:3rem;opacity:0.2">⊘</div>
  <h1 style="font-size:1.4rem;font-weight:500;color:var(--color-text-primary);margin:0">
    Access denied
  </h1>
  <p style="color:var(--color-text-secondary);max-width:340px;margin:0">
    Your role (<strong>{{ role_label }}</strong>) does not have permission to view this module.
    Contact an administrator to request access.
  </p>
  <a href="{{ url_for('overview.index') }}"
     style="margin-top:1rem;padding:0.5rem 1.4rem;border-radius:8px;background:var(--color-background-secondary);border:1px solid var(--color-border-secondary);color:var(--color-text-primary);text-decoration:none;font-size:0.9rem">
    ← Back to dashboard
  </a>
</div>
{% endblock %}
